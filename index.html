<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <title></title>
</head>
<body style="text-align: center; " >
    <div class="card text-center" style=" color: white; background: linear-gradient(blue,rgb(146, 146, 255)); background-repeat: no-repeat; background-size: cover;">
  <div class="card-header">
    Passcode game
  </div>
  <div class="card-body">
    <h6 class="card-title">Enter the code</h6>
    <p class="card-text">Hint:The code has four characters.</p>
    <input id="input" type="number" placeholder="Enter the passcode" style="padding: 6px; border-radius: 10px; border: 1px solid black;">
    <a href="#" class="btn btn-primary" onclick="any()">check</a>
    <h6 id="choose"></h6>
  </div>
  <div class="card-footer text-body-secondary" >
    2 days ago
  </div>
</div>
    <script>
        function any() {
            let show=document.getElementById("input").value;
            if (show == 4775) {
            document.getElementById("choose").innerText="correct passcode";
        }
        else{
            document.getElementById("choose").innerText="wrong passcode";
        }
        if (show == "") {
            alert("Please put a number!")
        }
    };
    </script>
</body>
</html>
